<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>VPL Admin · Dashboard</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:#0e0c09; --ink2:#1a1710; --ink3:#252118;
      --gold:#e8a020; --gold-lt:#f5c050; --amber:#d4780a;
      --text:#f5f0e8; --text2:#a09070; --text3:#605040;
      --border:rgba(232,160,32,.15); --border2:rgba(232,160,32,.08);
      --green:#22c55e; --red:#ef4444;
      --fd:'Playfair Display',serif; --fc:'Barlow Condensed',sans-serif; --fb:'Barlow',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--fb);background:var(--ink);color:var(--text);min-height:100vh}
    a{text-decoration:none;color:inherit}

    /* LOGIN */
    #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(180,100,10,.08),transparent)}
    .lcard{background:var(--ink2);border:1px solid var(--border);border-radius:20px;padding:52px 44px;width:100%;max-width:400px;text-align:center}
    .lcard-logo{font-family:var(--fd);font-size:2.8rem;font-weight:900;color:var(--gold);opacity:.3;margin-bottom:4px}
    .lcard-tag{font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);background:rgba(232,160,32,.08);border:1px solid rgba(232,160,32,.2);padding:4px 14px;border-radius:100px;display:inline-block;margin-bottom:24px}
    .lcard h1{font-family:var(--fd);font-size:1.6rem;font-weight:700;color:var(--text);margin-bottom:6px}
    .lcard p{color:var(--text2);font-size:.85rem;margin-bottom:32px}
    .linput{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--text);padding:13px 16px;border-radius:10px;font-family:var(--fb);font-size:.95rem;outline:none;margin-bottom:12px;transition:.3s}
    .linput:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,160,32,.1)}
    .lbtn{width:100%;background:var(--gold);color:var(--ink);border:none;padding:14px;border-radius:10px;font-family:var(--fc);font-weight:900;font-size:1.05rem;letter-spacing:.05em;cursor:pointer;transition:.3s;margin-top:4px}
    .lbtn:hover{background:var(--gold-lt);transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,160,32,.3)}
    .lerr{color:#ff6060;font-size:.78rem;margin-top:-6px;margin-bottom:8px;display:block;min-height:18px}

    /* DASHBOARD */
    #dash{display:none}
    .anav{background:rgba(14,12,9,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);padding:0 32px;position:sticky;top:0;z-index:100}
    .anav-inner{max-width:1200px;margin:0 auto;height:60px;display:flex;align-items:center;gap:16px}
    .anav-logo{font-family:var(--fd);font-size:1.2rem;font-weight:900;color:var(--gold)}
    .anav-sep{color:var(--text3);font-size:.9rem}
    .anav-title{font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
    .anav-btns{margin-left:auto;display:flex;gap:8px}
    .abtn{padding:8px 18px;border-radius:8px;font-size:.8rem;font-family:var(--fc);font-weight:700;letter-spacing:.05em;cursor:pointer;border:none;transition:.25s}
    .abtn-gold{background:var(--gold);color:var(--ink)}
    .abtn-gold:hover{background:var(--gold-lt)}
    .abtn-ghost{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border2)}
    .abtn-ghost:hover{border-color:var(--border);color:var(--text)}

    .abody{max-width:1200px;margin:0 auto;padding:36px 32px}

    /* STATS */
    .astat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px}
    .astat{background:var(--ink2);border:1px solid var(--border2);border-radius:14px;padding:24px;transition:.3s}
    .astat:hover{border-color:var(--border);transform:translateY(-2px)}
    .astat-lbl{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
    .astat-val{font-family:var(--fc);font-weight:900;font-size:2.2rem;color:var(--gold)}
    .astat-val.green{color:var(--green)}

    /* FILTERS */
    .afilter-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .afinput{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--text);padding:9px 14px;border-radius:8px;font-size:.85rem;outline:none;font-family:var(--fb);transition:.3s}
    .afinput:focus{border-color:var(--gold)}
    .afcount{margin-left:auto;font-size:.8rem;color:var(--text3);letter-spacing:.08em}

    /* TABLE */
    .atable-wrap{background:var(--ink2);border:1px solid var(--border2);border-radius:14px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead{background:rgba(232,160,32,.04)}
    th{padding:14px 16px;text-align:left;font-family:var(--fc);font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border2)}
    td{padding:13px 16px;font-size:.85rem;color:var(--text2);border-top:1px solid rgba(232,160,32,.05);vertical-align:middle}
    tr:hover td{background:rgba(232,160,32,.02)}
    .td-id{font-family:var(--fc);font-size:.75rem;color:var(--gold);letter-spacing:.05em}
    .td-name{color:var(--text);font-weight:500}
    .td-amt{font-family:var(--fc);font-weight:900;color:var(--green)}
    .td-thumb{width:48px;height:36px;object-fit:cover;border-radius:6px;cursor:pointer;transition:.2s;border:1px solid var(--border2)}
    .td-thumb:hover{transform:scale(1.1);border-color:var(--gold)}
    .nodata{padding:60px;text-align:center;color:var(--text3);font-size:1rem}
    .nodata-ico{font-size:3rem;display:block;margin-bottom:12px;opacity:.4}

    /* LIGHTBOX */
    #lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:none;align-items:center;justify-content:center;cursor:pointer}
    #lb.on{display:flex}
    #lb img{max-width:90vw;max-height:88vh;border-radius:12px;border:1px solid var(--border)}
    .lb-close{position:fixed;top:20px;right:24px;color:#fff;font-size:1.4rem;cursor:pointer;opacity:.6;transition:.2s}
    .lb-close:hover{opacity:1}

    @media(max-width:900px){
      .astat-row{grid-template-columns:repeat(2,1fr)}
      table{display:block;overflow-x:auto}
    }
    @media(max-width:600px){
      .abody{padding:24px 16px}
      .anav{padding:0 16px}
    }
  </style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <div class="lcard-logo">VPL</div>
    <div class="lcard-tag">Admin Access</div>
    <h1>Dashboard</h1>
    <p>Season 2 · 2026</p>
    <input class="linput" type="password" id="pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    <span class="lerr" id="lerr"></span>
    <button class="lbtn" onclick="login()">Enter Dashboard →</button>
  </div>
</div>

<div id="dash">
  <nav class="anav">
    <div class="anav-inner">
      <div class="anav-logo">VPL</div>
      <div class="anav-sep">/</div>
      <div class="anav-title">Admin · Season 2</div>
      <div class="anav-btns">
        <button class="abtn abtn-gold" onclick="exportCSV()">↓ CSV</button>
        <button class="abtn abtn-ghost" onclick="refreshData()">↻ Refresh</button>
        <button class="abtn abtn-ghost" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="abody">
    <div class="astat-row">
      <div class="astat"><div class="astat-lbl">Total Bookings</div><div class="astat-val" id="aTotal">0</div></div>
      <div class="astat"><div class="astat-lbl">Total Revenue</div><div class="astat-val green" id="aRevenue">₹0</div></div>
      <div class="astat"><div class="astat-lbl">Total People</div><div class="astat-val" id="aPeople">0</div></div>
      <div class="astat"><div class="astat-lbl">Today</div><div class="astat-val" id="aToday">0</div></div>
    </div>

    <div class="afilter-row">
      <input class="afinput" type="text" id="search" placeholder="Search name or phone…" oninput="filter()"/>
      <input class="afinput" type="date" id="dateF" oninput="filter()"/>
      <span class="afcount" id="afcount">—</span>
    </div>

    <div class="atable-wrap">
      <table>
        <thead><tr>
          <th>Booking ID</th><th>Name</th><th>Phone</th>
          <th>Persons</th><th>Amount</th><th>Date</th><th>Screenshot</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="lb" onclick="closeLB()">
  <div class="lb-close">✕</div>
  <img id="lbImg" src="" alt="Payment Screenshot"/>
</div>

<script>
let all = [];
const PASS = 'vpl2026admin';

function login() {
  if (document.getElementById('pass').value === PASS) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    refreshData();
    setInterval(refreshData, 30000);
  } else {
    document.getElementById('lerr').textContent = 'Incorrect password';
  }
}

function logout() {
  document.getElementById('dash').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('pass').value = '';
  document.getElementById('lerr').textContent = '';
}

function refreshData() {
  try { all = JSON.parse(localStorage.getItem('vpl2_bookings') || '[]'); } catch { all = []; }
  const today = new Date().toLocaleDateString('en-IN');
  document.getElementById('aTotal').textContent = all.length;
  document.getElementById('aRevenue').textContent = '₹' + all.reduce((s,b)=>s+(b.amount||0),0);
  document.getElementById('aPeople').textContent = all.reduce((s,b)=>s+(b.persons||0),0);
  document.getElementById('aToday').textContent = all.filter(b=>b.date===today).length;
  filter();
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const d = document.getElementById('dateF').value;
  const filtered = all.filter(b => {
    const ms = !q || (b.name||'').toLowerCase().includes(q) || (b.phone||'').includes(q);
    const md = !d || (b.timestamp||'').startsWith(d);
    return ms && md;
  });
  document.getElementById('afcount').textContent = filtered.length + ' booking' + (filtered.length!==1?'s':'');
  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="nodata"><span class="nodata-ico">🔍</span>No matching bookings</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(b => `
    <tr>
      <td class="td-id">${b.id||'—'}</td>
      <td class="td-name">${esc(b.name||'—')}</td>
      <td>${esc(b.phone||'—')}</td>
      <td>${b.persons||'—'}</td>
      <td class="td-amt">₹${b.amount||0}</td>
      <td>${b.date||'—'}</td>
      <td>${b.screenshot?`<img class="td-thumb" src="${b.screenshot}" alt="ss" onclick="openLB('${b.screenshot.replace(/'/g,"\\'")}')"/>`:'—'}</td>
    </tr>
  `).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function exportCSV() {
  const h = ['Booking ID','Name','Phone','Persons','Amount','Date','Timestamp'];
  const rows = all.map(b=>[b.id,b.name,b.phone,b.persons,b.amount,b.date,b.timestamp].map(v=>`"${String(v||'').replace(/"/g,'""')}"`));
  const csv = [h.join(','), ...rows.map(r=>r.join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `vpl2-bookings-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

function openLB(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lb').classList.add('on');
}
function closeLB() { document.getElementById('lb').classList.remove('on'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLB(); });
</script>
</body>
</html>
