<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>VPL — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Barlow:wght@400&display=swap" rel="stylesheet"/>
  <style>
    body{background:#0e0c09;color:#f5f0e8;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .logo{font-family:'Playfair Display',serif;font-size:5rem;color:#e8a020;opacity:.3;margin-bottom:8px}
    h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:#e8a020;margin-bottom:10px}
    p{color:#a09070;margin-bottom:28px;line-height:1.6}
    a{display:inline-block;background:#e8a020;color:#0e0c09;padding:12px 32px;border-radius:8px;font-weight:700;font-family:'Barlow',sans-serif;transition:.3s}
    a:hover{background:#f5c050}
  </style>
</head>
<body>
  <div>
    <div class="logo">VPL</div>
    <h2>You're Offline</h2>
    <p>Check your internet connection<br/>and try again.</p>
    <a href="/">Try Again</a>
  </div>
</body>
</html>
